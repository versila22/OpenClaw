services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_MODE=local
      - OPENCLAW_GATEWAY_BIND=custom
      - OPENCLAW_GATEWAY_CUSTOM_BIND_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - HOST=0.0.0.0
      - OPENCLAW_GATEWAY_TRUSTED_PROXIES=0.0.0.0/0
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY:-}
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY:-}
      - CLAUDE_WEB_COOKIE:=${CLAUDE_WEB_COOKIE:-}
      - OPENCLAW_GATEWAY_SUPERVISED="false"
      - TZ=${OPENCLAW_TZ:-UTC}
    volumes:
      #- ${OPENCLAW_CONFIG_DIR}:/data/.openclaw
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
#      - ${OPENCLAW_CONFIG_DIR}:/data/.openclaw
#      - ${OPENCLAW_WORKSPACE_DIR}:/data/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # On crée une route : si on tape l'IP, ça va vers openclaw
      - "traefik.http.routers.openclaw.rule=Host(`72.61.196.210`)"
      # On dit à Traefik sur quel port interne envoyer le trafic
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
      - "traefik.docker.network=traefik_default"
      # On autorise Traefik à accepter la connexion même si le navigateur force le HTTPS
      - "traefik.http.routers.openclaw.tls=true"
    command: ["node", "server.mjs", "--gateway.bind", "0.0.0.0", "--gateway.mode", "local"]
#    command:
#      - node
#      - /hostinger/dist/index.js
#      - gateway
#      - --bind
#      - lan
#      - --port
#      - "18789"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

